server {
    listen 8001;
    listen [::]:8001;

    server_name _;

    charset utf-8;
    client_max_body_size 20M;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    server_tokens off;

    if ($request_method !~ ^(GET|POST|HEAD|OPTIONS)$) {
        return 405;
    }

    # Laravel API endpoints (prefix match, higher priority)
    location /api/ {
        root /var/www/sentraguard/dashboard/public;
        try_files $uri $uri/ /index.php?$query_string;
        
        location ~ \.php$ {
            root /var/www/sentraguard/dashboard/public;
            fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_param HTTPS on;
            fastcgi_hide_header X-Powered-By;
            fastcgi_read_timeout 120;
            fastcgi_send_timeout 120;
        }
    }

    location /sanctum/ {
        root /var/www/sentraguard/dashboard/public;
        try_files $uri $uri/ /index.php?$query_string;
        
        location ~ \.php$ {
            root /var/www/sentraguard/dashboard/public;
            fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_param HTTPS on;
            fastcgi_hide_header X-Powered-By;
            fastcgi_read_timeout 120;
            fastcgi_send_timeout 120;
        }
    }

    location /login {
        root /var/www/sentraguard/dashboard/public;
        try_files $uri $uri/ /index.php?$query_string;
        
        location ~ \.php$ {
            root /var/www/sentraguard/dashboard/public;
            fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_param HTTPS on;
            fastcgi_hide_header X-Powered-By;
            fastcgi_read_timeout 120;
            fastcgi_send_timeout 120;
        }
    }

    location /logout {
        root /var/www/sentraguard/dashboard/public;
        try_files $uri $uri/ /index.php?$query_string;
        
        location ~ \.php$ {
            root /var/www/sentraguard/dashboard/public;
            fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_param HTTPS on;
            fastcgi_hide_header X-Powered-By;
            fastcgi_read_timeout 120;
            fastcgi_send_timeout 120;
        }
    }

    location /download/ {
        root /var/www/sentraguard/dashboard/public;
        try_files $uri $uri/ /index.php?$query_string;
        
        location ~ \.php$ {
            root /var/www/sentraguard/dashboard/public;
            fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_param HTTPS on;
            fastcgi_hide_header X-Powered-By;
            fastcgi_read_timeout 120;
            fastcgi_send_timeout 120;
        }
    }

    location /storage/ {
        root /var/www/sentraguard/dashboard/public;
        try_files $uri =404;
    }

    location /up {
        root /var/www/sentraguard/dashboard/public;
        try_files $uri $uri/ /index.php?$query_string;
        
        location ~ \.php$ {
            root /var/www/sentraguard/dashboard/public;
            fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_param HTTPS on;
            fastcgi_hide_header X-Powered-By;
            fastcgi_read_timeout 120;
            fastcgi_send_timeout 120;
        }
    }

    # Nuxt SPA (everything else)
    location / {
        root /var/www/sentraguard/frontend/.output/public;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    access_log /var/log/nginx/sentraguard-access.log;
    error_log  /var/log/nginx/sentraguard-error.log;
}
