version: '3.8'

services:
  laravel:
    build:
      context: .
      dockerfile: Dockerfile.laravel
    container_name: sentraguard-laravel
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./dashboard:/var/www
      - ./agent/build:/var/www/public/download
    networks:
      - sentraguard-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    env_file:
      - docker/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001"]
      interval: 30s
      timeout: 10s
      retries: 3

  nuxt:
    build:
      context: .
      dockerfile: Dockerfile.nuxt
    container_name: sentraguard-nuxt
    restart: unless-stopped
    networks:
      - sentraguard-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: sentraguard-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./docker/proxy-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - sentraguard-net
    depends_on:
      - laravel
      - nuxt
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  sentraguard-net:
    driver: bridge
